services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gigflow_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRE=${JWT_EXPIRE}
      - NODE_ENV=production
    networks:
      - gigflow_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gigflow_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - gigflow_network

networks:
  gigflow_network:
    driver: bridge